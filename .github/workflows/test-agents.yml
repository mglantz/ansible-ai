name: AI Agent Ansible Benchmark

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      agents:
        description: "Comma-separated agents to test (claude-sonnet,gpt-4o)"
        required: false
        default: "claude-sonnet,gpt-4o"

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────
  # Run each agent as a parallel matrix job
  # ──────────────────────────────────────────────
  test-agent:
    name: "Test ${{ matrix.agent }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false          # keep running other agents even if one fails
      matrix:
        agent:
          - claude-sonnet
          - gpt-4o

    steps:
      # ── Checkout ──────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python environment ────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install \
            ansible \
            ansible-lint \
            molecule \
            molecule-plugins[docker] \
            docker \
            anthropic \
            openai

      # ── Docker (for Molecule) ─────────────────
      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      # ── Pull Molecule base image ───────────────
      - name: Pull Molecule base image
        run: docker pull geerlingguy/docker-ubuntu2204-ansible:latest

      # ── Generate Ansible role via AI agent ────
      - name: "Generate Ansible role — ${{ matrix.agent }}"
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python scripts/run_agent_test.py \
            --agent "${{ matrix.agent }}" \
            --output-meta agent_meta.json
        continue-on-error: true   # even if generation fails, run update_results

      # ── Print generated role for transparency ─
      - name: Show generated role
        if: always()
        run: |
          echo "=== tasks/main.yml ===" && cat roles/webserver/tasks/main.yml 2>/dev/null || echo "(not generated)"
          echo "=== handlers/main.yml ===" && cat roles/webserver/handlers/main.yml 2>/dev/null || echo "(not generated)"

      # ── Molecule test ─────────────────────────
      - name: Run Molecule test
        id: molecule
        run: python scripts/run_molecule.py
        continue-on-error: true

      # ── Upload test artifacts ─────────────────
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.agent }}-results"
          path: |
            agent_meta.json
            molecule_result.json
            roles/webserver/
          retention-days: 30

      # ── Persist results to repository ─────────
      - name: Update results JSON
        if: always()
        run: |
          python scripts/update_results.py \
            --agent "${{ matrix.agent }}" \
            --agent-meta agent_meta.json \
            --molecule-result molecule_result.json \
            --run-id "${{ github.run_id }}" \
            --commit "${{ github.sha }}"

      # ── Commit updated results ─────────────────
      - name: Commit results
        if: always()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: update results for ${{ matrix.agent }} [run ${{ github.run_id }}]"
          file_pattern: results/results.json
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

  # ──────────────────────────────────────────────
  # After all agents finish, trigger Pages deploy
  # ──────────────────────────────────────────────
  deploy-pages:
    name: Deploy GitHub Pages
    needs: test-agent
    if: always()
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main       # get the latest commit (with updated results.json)

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."       # serve the whole repo root (index.html + results/)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
